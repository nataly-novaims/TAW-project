<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Events for students</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="main.html">Events</a>
            </div>
            <div class="auth-buttons">
                <a href="registration.html">Register</a>
                <a href="">Login</a>
            </div>
        </nav>
    </header>
    <main class="events-page-container">
        <h1 class="events-page-title">All events</h1>
        <div class="filter-section">
            <input type="text" id="search-input" class="glass-input" placeholder="Search the event...">
            <select id="category-select" class="glass-select">
                <option value="all">All categories</option>
                <option value="workshop">Workshop</option>
                <option value="Sport">Sport</option>
                <option value="Music">Music</option>
            </select>
        </div>

        <div class="events-grid" id="all-events-grid"></div>
        <script src="data.js"></script>
        <script src="app.js"></script>
            
            
    </main>
    <footer>
        <p> 2026 TAW project</p>
    </footer>
</body>
</html>
