<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Events for students</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">Events</a>
            </div>
            <div class="auth-buttons">
                <a href="registration.html">Register</a>
                <a href="login.html">Login</a>
            </div>
        </nav>
    </header>
    <main class="register-container">
        <div class="glass-form">
            <h2>Welcome back</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username or Email" class="glass-input" required>
                <input type="password" id="password" placeholder="Password" class="glass-input" required>
                <button type="submit" class="register-button">Login</button>
            </form>
            <p id="form-message"></p>
            <p>Don't have an account? <a href="registration.html">Register</a></p>
        </div>            
    </main>
    <footer>
        <p> 2026 TAW project</p>
    </footer>
    <script src="auth.js"></script>
</body>
</html>
