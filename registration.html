<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Events for students</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="main.html">Events</a>
            </div>
            <div class="auth-buttons">
                <a href="">Register</a>
                <a href="">Login</a>
            </div>
        </nav>
    </header>
    <main class="register-container">
        <div class="glass-form">
            <h2>Join the community</h2>
            <form>
                <input type="text" placeholder="Username" class="glass-input" required>
                <input type="email" placeholder="Email" class="glass-input" required>
                <input type="password" placeholder="Password" class="glass-input" required>
                <button type="submit" class="register-button">Create account</button>
            </form>
            <p>Already have an account?    <a href="#">Login</a></p>
        </div>            
    </main>
    <footer>
        <p> 2026 TAW project</p>
    </footer>
</body>
</html>
